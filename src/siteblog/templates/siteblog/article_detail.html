{% extends "siteblog/base.html" %}
{% load i18n %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
  <article class="siteblog-article">
    <h1>{{ article.title }}</h1>
    <p class="siteblog-meta">
      <time datetime="{{ article.published_on|date:'c' }}">
        {{ article.published_on|date:"DATE_FORMAT" }}
      </time>
    </p>
    <div class="siteblog-body">
      {{ article.article_body.content|safe }}
    </div>
  </article>
{% endblock %}
